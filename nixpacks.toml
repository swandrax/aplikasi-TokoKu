# Nixpacks configuration for Laravel PHP 8.4
[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.intl", "php84Extensions.bcmath", "php84Extensions.curl", "php84Extensions.tokenizer", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
